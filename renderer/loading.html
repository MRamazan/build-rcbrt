<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recbert AI loading...</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      -webkit-app-region: drag;
      user-select: none;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      color: #1E3A5F;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .logo-icon {
      width: 250px;
      height: 250px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon img {
  width: 250px;
  height: 250px;
  object-fit: contain;

}

    .app-name {
      font-size: 2.2rem;
      font-weight: 700;
      color: #0066FF;
      letter-spacing: -0.5px;
    }

    .spinner-ring {
      width: 44px;
      height: 44px;
      border: 4px solid #E6F2FF;
      border-top: 4px solid #0066FF;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    #status {
      font-size: 0.92rem;
      color: #64748B;
      font-weight: 550;
      text-align: center;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dot-wave {
      display: inline-flex;
      gap: 5px;
      margin-left: 6px;
    }
    .dot-wave span {
      width: 6px;
      height: 6px;
      background: #0066FF;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot-wave span:nth-child(2) { animation-delay: 0.2s; }
    .dot-wave span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes spin   { to { transform: rotate(360deg); } }

    @keyframes bounce { 0%,80%,100% { transform: scale(0); }
                        40%         { transform: scale(1); } }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-icon">
      <img src="./assets/logo.png" alt="Recbert AI Logo">
    </div>
    <div class="app-name">Recbert AI</div>
  </div>

  <div class="spinner-ring"></div>

  <div id="status">
    Loading Recbert AI...
    <span class="dot-wave">
      <span></span><span></span><span></span>
    </span>
  </div>
</body>
</html>
